<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            width:360px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        .welcome-text{
            margin-bottom:30px;
            color:#666;
            font-size:16px;
            line-height:1.5;
        }

        .button-group{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#4e73df;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
            text-decoration:none;
            display:inline-block;
        }

        .btn:hover{
            background:#2e59d9;
        }

        .btn-secondary{
            background:#1cc88a;
        }

        .btn-secondary:hover{
            background:#17a673;
        }

        .btn-guest{
            background:#6c757d;
        }

        .btn-guest:hover{
            background:#5a6268;
        }

        .divider{
            margin:20px 0;
            position:relative;
            text-align:center;
        }

        .divider::before{
            content:"";
            position:absolute;
            top:50%;
            left:0;
            right:0;
            height:1px;
            background:#ddd;
        }

        .divider span{
            background:white;
            padding:0 15px;
            position:relative;
            color:#999;
            font-size:13px;
        }

        .footer{
            margin-top:20px;
            font-size:13px;
            color:#777;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Welcome</h2>

    <p class="welcome-text">
        Welcome to our application. Login to your account, create a new one, or continue as a guest to browse.
    </p>

    <div class="button-group">
        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn btn-secondary">Create Account</a>

        <div class="divider">
            <span>or</span>
        </div>

        <a href="guest.html" class="btn btn-guest">Continue as Guest</a>
    </div>

    <div class="footer">
        &copy; 2026 DandS Project
    </div>

</div>

</body>
</html>
