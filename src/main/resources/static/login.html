<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            width:360px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#4e73df;
            box-shadow:0 0 5px rgba(78,115,223,0.4);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            background:#4e73df;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2e59d9;
        }

        #message{
            margin-top:15px;
            font-size:14px;
            color:#444;
        }

        .footer{
            margin-top:20px;
            font-size:13px;
            color:#777;
        }

        .footer a{
            color:#4e73df;
            text-decoration:none;
        }

        .footer a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Welcome Back</h2>

    <form id="loginForm">

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <p id="message"></p>

    <div class="footer">
        Don't have an account? <a href="register.html">Create one</a>
    </div>

</div>

<script>

    document.getElementById("loginForm").addEventListener("submit", function(e){

        e.preventDefault();

        const user = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        fetch("http://localhost:8080/api/users/login", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        })
            .then(response => response.text())
            .then(data => {
                document.getElementById("message").innerText = data;
                // Optional: redirect on successful login
                if(data === "Login successful") {
                    document.getElementById("message").style.color = "green";
                    // window.location.href = "dashboard.html"; // Uncomment to redirect
                } else {
                    document.getElementById("message").style.color = "red";
                }
            })
            .catch(error => {
                document.getElementById("message").innerText = "Server error. Please try again.";
                document.getElementById("message").style.color = "red";
            });

    });

</script>

</body>
</html>
